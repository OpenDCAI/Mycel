server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's embedded DNS for deferred hostname resolution
    resolver 127.0.0.11 valid=30s;

    # Proxy /api/* to backend via Coolify's internal Traefik proxy.
    # Using a variable defers DNS lookup to request time so nginx starts
    # even if coolify-proxy is momentarily unavailable.
    location /api/ {
        set $traefik_proxy http://coolify-proxy;
        proxy_pass $traefik_proxy/api/;
        proxy_set_header Host api.mycel.nextmind.space;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
    }

    # React SPA — all other routes to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
